services:
  frontend:
    image: ghcr.io/profiidev/images/node-alpine-dev:main@sha256:a9021d8b424f81e5c3d4a5eef98041b011fd2054c303e7e687acc60167f18f2a
    restart: unless-stopped
    user: '${HOST_UID:-0}:${HOST_GID:-0}'
    volumes:
      - ./frontend:/app/frontend
      - ./node_modules:/app/node_modules
      - ./package-lock.json:/app/package-lock.json
      - ./package.json:/app/package.json
    tty: true
    ports:
      - '5176:5176'
    networks:
      - nginx
    working_dir: /app/frontend
    command: npm run dev -- --host
    #command: npm i

  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    restart: unless-stopped
    user: '${HOST_UID:-0}:${HOST_GID:-0}'
    volumes:
      - ./.cargo:/app/.cargo
      - ./backend:/app
    networks:
      - nginx
    tty: true
    ports:
      - '5175:8000'
    entrypoint: ['tini', '--']
    command: ['cargo', 'watch', '-x', 'run']
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18@sha256:52e6ffd11fddd081ae63880b635b2a61c14008c17fc98cdc7ce5472265516dd0
    restart: unless-stopped
    volumes:
      - ./postgres:/var/lib/postgresql
    environment:
      - POSTGRES_PASSWORD=test
      - POSTGRES_USER=test
      - POSTGRES_DB=test
    networks:
      - nginx
    ports:
      - '9302:5432'
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'test']
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 10s
      start_interval: 1s

  nats:
    image: nats:latest
    tty: true
    networks:
      - nginx
    ports:
      - 4222:4222

networks:
  nginx:
