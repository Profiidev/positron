name: Tests
on:
  pull_request:

jobs:
  backend_test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy,rustfmt

      - uses: awalsh128/cache-apt-pkgs-action@2c09a5e66da6c8016428a2172bd76e5e4f14bb17 # latest
        with:
          packages: libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          version: 1.0

      - name: Cache cargo and rust files
        id: rust_cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true
          shared-key: "backend_test_cache"

      - uses: taiki-e/install-action@nextest
      - name: "Backend Test"
        run: cargo nextest run --workspace --all-features

      - name: Upload Test Result File
        uses: actions/upload-artifact@v7
        with:
          name: test-results-backend
          path: ${{ github.workspace }}/target/nextest/default/junit-backend.xml
          retention-days: 5

  comment_results:
    name: Comment Results to PR
    runs-on: ubuntu-latest
    needs:
      - backend_test
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          client-id: ${{ secrets.COMMIT_BOT_CLIENT_ID }}
          private-key: ${{ secrets.COMMIT_BOT_PRIVATE_KEY }}
      - name: Download Test Results
        uses: actions/download-artifact@v8
        with:
          pattern: test-results-*
          merge-multiple: true
          path: test-results
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          files: |
            test-results/**/*.xml
